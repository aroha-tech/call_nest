# Example: nginx on the droplet — replace YOUR_IP and `root` path.
# Browser: http://YOUR_IP  → static SPA + /api → Node on 127.0.0.1:4000
#
# If you see 500 on /:
#   1) `dist` must exist (run `npm run build` in client). Check: ls .../client/dist/index.html
#   2) nginx runs as www-data — it must traverse /home/yash. Fix: sudo chmod o+x /home/yash
#      (or move site under /var/www/... and chown www-data)
#   3) Read error: sudo tail -30 /var/log/nginx/error.log
#
# sudo cp deploy/nginx-ip.example.conf /etc/nginx/sites-available/call-nest
# Edit paths + IP, then:
# sudo ln -sf /etc/nginx/sites-available/call-nest /etc/nginx/sites-enabled/call-nest
# sudo rm -f /etc/nginx/sites-enabled/default
# sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name YOUR_IP _;

    root /var/www/call-nest/client/dist;
    index index.html;

    location /api {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:4000/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
