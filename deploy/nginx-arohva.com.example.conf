# HTTPS — arohva.com (edit both `root` paths to your dist folder)
#
# DNS: A/AAAA for arohva.com and www → droplet IP. Wait for propagation.
#
# First certificate (pick one):
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d arohva.com -d www.arohva.com
# Or start from HTTP-only (see nginx-ip.example.conf), get certs, then merge SSL paths below.
# ssl_certificate* paths must exist or nginx -t will fail — comment 443 blocks until ready.
#
# Canonical URL: https://arohva.com (www redirects here)

server {
    listen 80;
    listen [::]:80;
    server_name arohva.com www.arohva.com;

    root /var/www/call-nest/client/dist;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://arohva.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.arohva.com;

    ssl_certificate /etc/letsencrypt/live/arohva.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arohva.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://arohva.com$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name arohva.com;

    ssl_certificate /etc/letsencrypt/live/arohva.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/arohva.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/call-nest/client/dist;
    index index.html;

    location /api {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://127.0.0.1:4000/health;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
