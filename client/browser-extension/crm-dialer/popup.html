<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Call Nest CRM Dialer</title>
    <style>
      body { font-family: Arial, sans-serif; width: 340px; padding: 12px; }
      h3 { margin: 0 0 8px; font-size: 15px; }
      .muted { color: #555; font-size: 12px; }
      button { margin-top: 10px; width: 100%; padding: 8px; cursor: pointer; }
      .panel { margin-top: 10px; border: 1px solid #e4e7ec; border-radius: 6px; padding: 8px; }
      .kv { font-size: 12px; margin: 4px 0; word-break: break-word; }
      .list { max-height: 160px; overflow: auto; font-size: 12px; margin-top: 6px; }
      .item { padding: 6px; border-top: 1px solid #f1f3f5; }
      .title { font-weight: 600; margin-bottom: 4px; }
    </style>
  </head>
  <body>
    <h3>Call Nest CRM Dialer</h3>
    <div class="muted">Injects Call buttons on CRM pages for click-to-call.</div>
    <button id="runInspector">Run Adapter Inspector</button>
    <button id="openSettings">Open Settings</button>
    <div class="panel">
      <div class="title">Inspector Output</div>
      <div class="kv"><b>CRM:</b> <span id="crmCode">-</span></div>
      <div class="kv"><b>Contact:</b> <span id="contactName">-</span></div>
      <div class="kv"><b>External ID:</b> <span id="externalContactId">-</span></div>
      <div class="list" id="phoneCandidates">No data yet.</div>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
